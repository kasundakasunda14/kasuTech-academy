<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KasuTech Academy - Online Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:700px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.logo{
    width:120px;
    height:120px;
    border:2px dashed #0056b3;
    border-radius:10px;
    margin:0 auto 15px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#0056b3;
    font-weight:bold;
}

h1{
    color:#0056b3;
}

.subtitle{
    color:#666;
    margin-top:5px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select, textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    resize:none;
}

.buttons{
    text-align:center;
    margin-top:20px;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
    margin:5px;
}

.register{
    background:#0056b3;
    color:white;
}

.register:hover{
    background:#003f82;
}

.reset{
    background:#dc3545;
    color:white;
}

.reset:hover{
    background:#b02a37;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">

        <!-- PHOTO / LOGO PLACEHOLDER -->
        <img src="kasunda1.png"
     width="120"
     height="120"
     style="border-radius:10px;">

        <h1>KasuTech Academy</h1>
        <p class="subtitle">Online Student Registration Form</p>

    </div>

    <form>

        <div class="form-group">
            <label>Sir Name</label>
            <input type="text" placeholder="Sirname" required>
        </div>
        <div class="form-group">

 <label>First Name</label>
            <input type="text" placeholder="Enter first name" required>
</div>

<div class="form-group">
             <label>Other Names</label>
            <input type="text" placeholder="Enter other names" required>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select required>
                <option>Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Grade Applying For</label>
            <select required>
                <option>Select Grade</option>
                <option>Grade 8</option>
                <option>Grade 9</option>
                <option>Grade 10</option>
                <option>Grade 11</option>
                <option>Grade 12</option>
            </select>
        </div>

        <div class="form-group">
            <label>Parent/Guardian Name</label>
            <input type="text" placeholder="Parent or Guardian Name" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+260 xxx xxx xxx" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="example@email.com">
        </div>

        <div class="form-group">
            <label>Home Address</label>
            <textarea rows="4" placeholder="Enter residential address"></textarea>
        </div>

<div class="form-group"
         <label>compound</label>
            <input type="text" placeholder="Ennter compound" required>
            </form>
        <div class="form-group">
            <label>Upload Student Photo</label>
            <input type="file" accept="image/*">
        </div>

        <div class="buttons">
            <button type="submit" class="btn register">
                Register Student
            </button>

            <button type="reset" class="btn reset">
                Clear Form
            </button>
        </div>

    </form>

    <div class="footer">
        © 2026 KasuTech Academy. All Rights Reserved.
    </div>

</div>

</body>
</html>
